<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Bus Booking Platform</title>
    <style>
        :root {
            --bg-color: #faf8f3;
            --text-color: #2c2c2c;
            --card-bg: rgba(255, 248, 240, 0.9);
            --available: #f97316;
            --available-hover: #ea580c;
            --held: #f59e0b;
            --booked: #d4a574;
            --accent: #d97706;
            --accent-hover: #b45309;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #faf8f3 0%, #ffe8cc 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 2rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: -webkit-linear-gradient(45deg, #d97706, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #8b6f47;
            font-size: 1.1rem;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(217, 119, 6, 0.2);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(139, 111, 71, 0.15), 0 8px 10px -6px rgba(139, 111, 71, 0.1);
            max-width: 800px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(217, 119, 6, 0.3);
            background: rgba(255, 253, 250, 0.8);
            color: #2c2c2c;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent);
        }

        select option {
            background: #faf8f3;
            color: #2c2c2c;
        }

        .reset-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: #d97706;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background: #b45309;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #6b5b4f;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .seat {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .seat::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            border-radius: 12px;
        }

        .seat.AVAILABLE {
            background-color: var(--available);
            border: 2px solid var(--available);
        }

        .seat.AVAILABLE:hover {
            transform: translateY(-4px) scale(1.05);
            background-color: var(--available-hover);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .seat.SELECTED {
            background-color: var(--held);
            border: 2px solid var(--held);
            cursor: not-allowed;
            animation: pulse 2s infinite;
        }

        .seat.BOOKED {
            background-color: var(--booked);
            border: 2px solid rgba(212, 165, 116, 0.3);
            cursor: not-allowed;
            color: #8b7355;
            opacity: 0.8;
        }

        .seat-number {
            z-index: 1;
        }

        .seat-holder {
            font-size: 0.65rem;
            font-weight: normal;
            margin-top: 4px;
            z-index: 1;
            text-align: center;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: rgba(250, 248, 243, 0.95);
            border-left: 4px solid var(--accent);
            color: #2c2c2c;
            box-shadow: 0 10px 15px -3px rgba(139, 111, 71, 0.2);
            transform: translateX(150%);
            transition: transform 0.3s ease-out;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

    </style>
</head>
<body>

    <header>
        <h1>Advanced Bus Booking Platform</h1>
        <p class="subtitle">Concurrent Seat Selection with 10s Lock Timeout</p>
    </header>

    <div class="container">
        <div class="controls">
            <select id="busSelect" onchange="fetchSeats()">
                <option value="Express-101">Express-101</option>
                <option value="NightRider-202">NightRider-202</option>
            </select>
            
            <select id="dateSelect" onchange="fetchSeats()">
                <option value="2026-04-28">2026-04-28</option>
                <option value="2026-04-29">2026-04-29</option>
                <option value="2026-04-30">2026-04-30</option>
            </select>

            <input type="text" id="username" placeholder="Enter your name" value="WebUser">
            <button class="reset-btn" onclick="resetSeats()">Reset This Bus/Date</button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: var(--available);"></div> Available
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--held);"></div> Selected (10s Lock)
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--booked);"></div> Booked
            </div>
        </div>

        <div class="seats-grid" id="seats-grid">
            <!-- Seats will be rendered here dynamically -->
        </div>
    </div>

    <div id="toast" class="toast">Booking request sent!</div>

    <script>
        const API_SEATS = '/api/seats';
        const API_BOOK = '/api/book';
        const API_RESET = '/api/reset';
        const API_CANCEL = '/api/cancel';
        
        const grid = document.getElementById('seats-grid');
        const usernameInput = document.getElementById('username');
        const busSelect = document.getElementById('busSelect');
        const dateSelect = document.getElementById('dateSelect');
        const toast = document.getElementById('toast');

        function getQueryParams() {
            return `?busId=${encodeURIComponent(busSelect.value)}&date=${encodeURIComponent(dateSelect.value)}`;
        }

        function getPostData(seatNumber) {
            const username = usernameInput.value.trim() || 'Anonymous';
            return `seatNumber=${seatNumber}&userName=${encodeURIComponent(username)}&busId=${encodeURIComponent(busSelect.value)}&date=${encodeURIComponent(dateSelect.value)}`;
        }

        // Fetch and render seats
        async function fetchSeats() {
            try {
                const response = await fetch(API_SEATS + getQueryParams());
                const seats = await response.json();
                renderSeats(seats);
            } catch (error) {
                console.error('Error fetching seats:', error);
            }
        }

        function renderSeats(seats) {
            const currentUserName = usernameInput.value.trim() || 'Anonymous';
            grid.innerHTML = '';
            seats.forEach(seat => {
                const div = document.createElement('div');
                div.className = `seat ${seat.status}`;
                div.innerHTML = `
                    <div class="seat-number">${seat.seatNumber}</div>
                    <div class="seat-holder">${seat.holderName || ''}</div>
                `;
                
                if (seat.status === 'AVAILABLE') {
                    div.onclick = () => bookSeat(seat.seatNumber);
                } else if ((seat.status === 'BOOKED' || seat.status === 'SELECTED') && seat.holderName === currentUserName) {
                    div.onclick = () => cancelSeat(seat.seatNumber);
                    div.style.cursor = 'pointer';
                    div.title = "Click to deselect/cancel";
                }
                
                grid.appendChild(div);
            });
        }

        async function bookSeat(seatNumber) {
            showToast(`Requesting Seat ${seatNumber}...`);
            try {
                await fetch(API_BOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: getPostData(seatNumber)
                });
                fetchSeats();
            } catch (error) {
                console.error('Error booking seat:', error);
                showToast('Error sending request!');
            }
        }

        async function cancelSeat(seatNumber) {
            showToast(`Cancelling Seat ${seatNumber}...`);
            try {
                const response = await fetch(API_CANCEL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: getPostData(seatNumber)
                });
                const data = await response.json();
                if (!data.success) {
                    showToast('Failed to cancel (You must be the owner)');
                }
                fetchSeats();
            } catch (error) {
                console.error('Error cancelling seat:', error);
                showToast('Error cancelling request!');
            }
        }

        async function resetSeats() {
            showToast("Resetting seats...");
            try {
                await fetch(API_RESET, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: getPostData(0) // Dummy seat number just to pass bus and date
                });
                fetchSeats();
            } catch (error) {
                console.error('Error resetting seats:', error);
                showToast('Error resetting seats!');
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Poll every 1 second
        setInterval(fetchSeats, 1000);
        
        // Initial load
        fetchSeats();
    </script>
</body>
</html>
